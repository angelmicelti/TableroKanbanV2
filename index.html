<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Todos los meta tags PWA se mantienen igual -->
    <meta name="application-name" content="Tablero Kanban">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Kanban">
    <meta name="description" content="Organiza tus tareas de manera eficiente">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#3b82f6">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="theme-color" content="#3b82f6">

    <!-- Apple Touch Icons (solo se referencian tamaños de icono que existen) -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">

    <!-- Safari Pinned Tab -->
    <link rel="mask-icon" href="icons/icon-192x192.png" color="#3b82f6">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="splash/splash-640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-1536x2048.png" media="(min-device-width: 768px) and (max-device-width: 1024px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-1668x2388.png" media="(min-device-width: 834px) and (max-device-width: 834px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="splash/splash-2048x2732.png" media="(min-device-width: 1024px) and (max-device-width: 1024px) and (-webkit-min-device-pixel-ratio: 2) and (orientation: portrait)">

    <meta name="msapplication-config" content="browserconfig.xml">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        body {
            box-sizing: border-box;
        }
        .task-card {
            transition: all 0.3s ease;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .column {
            min-height: 400px;
        }
        .drag-over {
            background-color: #f0f9ff;
            border: 2px dashed #3b82f6;
        }
        .move-buttons {
            display: none;
        }
        .task-card:hover .move-buttons {
            display: flex;
        }
        
        /* ESTILOS RESPONSIVOS MEJORADOS */
        @media (max-width: 768px) {
            .move-buttons {
                display: flex !important;
            }
            
            /* Formulario responsivo mejorado */
            .task-form-container {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            
            .task-input-mobile {
                width: 100%;
                margin-bottom: 8px;
            }
            
            .task-button-mobile {
                width: 100%;
                padding: 12px;
            }
            
            /* Ajustes generales para móviles */
            .mobile-padding {
                padding: 16px;
            }
            
            .mobile-margin {
                margin-bottom: 16px;
            }
            
            .mobile-text {
                font-size: 1.5rem;
            }
        }
        
        .firebase-status {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .firebase-status.connected {
            background-color: #dcfce7;
            color: #166534;
        }
        .firebase-status.disconnected {
            background-color: #fef9c3;
            color: #854d0e;
        }

        .collapsible-section {
            transition: all 0.3s ease;
        }
        .collapsible-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .collapsible-section.collapsed .collapsible-content {
            max-height: 0;
        }
        .collapsible-section.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        .toggle-icon {
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8 mobile-margin">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2 mobile-text">📋 Tablero Kanban</h1>
            <p class="text-gray-600">Organiza tus tareas de manera eficiente</p>
            <div id="firebaseStatusBar" class="mt-2 flex justify-center">
                <span id="firebaseStatus" class="firebase-status disconnected">⏳ Conectando a Firebase...</span>
            </div>
        </div>

        <!-- Main container -->
        <div class="bg-white rounded-lg shadow-md p-4 md:p-6 mb-8 mobile-padding">
            <!-- Save/Import Tasks Section -->
            <div class="collapsible-section mb-4 collapsed">
                <button class="section-toggle w-full flex justify-between items-center text-left mb-2" data-action="toggle-section" data-section-id="save-import">
                    <h3 class="text-sm font-medium text-gray-700">💾 Guardar e Importar Tareas</h3>
                    <svg class="toggle-icon w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <div id="save-import" class="collapsible-content">
                    <div class="flex flex-col sm:flex-row gap-3">
                        <button
                            data-action="export-tasks"
                            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
                        >
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                            </svg>
                            Descargar Tareas
                        </button>
                        
                        <label class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-medium transition-colors cursor-pointer flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 11-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>
                            </svg>
                            Cargar Tareas
                            <input type="file" id="importFile" accept=".json" class="hidden">
                        </label>
                        
                        <button
                            data-action="clear-tasks"
                            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center justify-center gap-2"
                        >
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" clip-rule="evenodd"></path>
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
                            </svg>
                            Limpiar Todo
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Add Task Form -->
            <div>
                <h2 class="text-xl font-semibold text-gray-800 mb-4">➕ Agregar Nueva Tarea</h2>
                <div class="task-form-container">
                    <form id="taskForm" class="flex flex-col md:flex-row gap-4">
                        <input 
                            type="text" 
                            id="taskInput" 
                            placeholder="Escribe tu tarea aquí..." 
                            class="task-input-mobile md:flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required
                        >
                        <button 
                            type="submit" 
                            class="task-button-mobile bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium transition-colors md:w-auto"
                        >
                            Agregar Tarea
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Kanban Board -->
        <div id="kanban-board" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- No Iniciado Column -->
            <div class="bg-white rounded-lg shadow-md p-6 column" data-status="no-iniciado">
                <div class="flex items-center mb-4">
                    <div class="w-4 h-4 bg-gray-400 rounded-full mr-3"></div>
                    <h3 class="text-lg font-semibold text-gray-700">No Iniciado</h3>
                    <span class="ml-auto bg-gray-100 text-gray-600 px-2 py-1 rounded-full text-sm" id="count-no-iniciado">0</span>
                </div>
                <div id="no-iniciado" class="space-y-3 min-h-[300px]" data-drop-zone="no-iniciado">
                    <!-- Tasks will be added here -->
                </div>
            </div>

            <!-- En Proceso Column -->
            <div class="bg-white rounded-lg shadow-md p-6 column" data-status="en-proceso">
                <div class="flex items-center mb-4">
                    <div class="w-4 h-4 bg-yellow-400 rounded-full mr-3"></div>
                    <h3 class="text-lg font-semibold text-gray-700">En Proceso</h3>
                    <span class="ml-auto bg-yellow-100 text-yellow-600 px-2 py-1 rounded-full text-sm" id="count-en-proceso">0</span>
                </div>
                <div id="en-proceso" class="space-y-3 min-h-[300px]" data-drop-zone="en-proceso">
                    <!-- Tasks will be added here -->
                </div>
            </div>

            <!-- Finalizado Column -->
            <div class="bg-white rounded-lg shadow-md p-6 column" data-status="finalizado">
                <div class="flex items-center mb-4">
                    <div class="w-4 h-4 bg-green-400 rounded-full mr-3"></div>
                    <h3 class="text-lg font-semibold text-gray-700">Finalizado</h3>
                    <span class="ml-auto bg-green-100 text-green-600 px-2 py-1 rounded-full text-sm" id="count-finalizado">0</span>
                </div>
                <div id="finalizado" class="space-y-3 min-h-[300px]" data-drop-zone="finalizado">
                    <!-- Tasks will be added here -->
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="mt-8 bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">📊 Estadísticas</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="text-center">
                    <div class="text-2xl font-bold text-blue-600" id="total-tasks">0</div>
                    <div class="text-sm text-gray-600">Total de Tareas</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-gray-600" id="pending-tasks">0</div>
                    <div class="text-sm text-gray-600">Pendientes</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-yellow-600" id="progress-tasks">0</div>
                    <div class="text-sm text-gray-600">En Progreso</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-green-600" id="completed-tasks">0</div>
                    <div class="text-sm text-gray-600">Completadas</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts externos (Firebase compat SDK + Tailwind) deben cargarse
         como scripts clásicos porque exponen globales (firebase, tailwind)
         que nuestros módulos ES6 necesitan. Los módulos se cargan siempre
         con type="module" (defer implícito), por lo que se ejecutan
         después de estos scripts. -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
